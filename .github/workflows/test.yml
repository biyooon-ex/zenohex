name: Test

env:
  MIX_ENV: test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: mix test (${{ matrix.os }}, Elixir ${{ matrix.beam.elixir_version }}, OTP ${{ matrix.beam.otp_version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          # WHY: not using `-latest` to `os:`, see https://github.com/biyooon-ex/zenohex/pull/196
          - ubuntu-24.04
          - macos-26
          - windows-2022
        beam:
          - otp_version: 27.3.4.2
            elixir_version: 1.18.4
          - otp_version: 28.5
            elixir_version: 1.19.5
          - otp_version: 29.0.1
            elixir_version: 1.20.0

    steps:
      - uses: actions/checkout@v7

      - uses: erlef/setup-beam@v1
        id: setup-beam
        with:
          otp-version: ${{ matrix.beam.otp_version }}
          elixir-version: ${{ matrix.beam.elixir_version }}

      - name: Cache mix deps
        id: deps-cache
        uses: actions/cache@v6
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-${{ steps.setup-beam.outputs.otp-version }}-${{ steps.setup-beam.outputs.elixir-version }}-${{ hashFiles('**/*.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-${{ steps.setup-beam.outputs.otp-version }}-${{ steps.setup-beam.outputs.elixir-version }}-

      - name: Cache compiled NIF
        id: nif-cache
        uses: actions/cache@v6
        with:
          path: |
            priv/native
          key: nif-${{ runner.os }}-${{ steps.setup-beam.outputs.otp-version }}-${{ hashFiles('native/zenohex_nif/Cargo.lock', 'native/zenohex_nif/Cargo.toml', 'native/zenohex_nif/rust-toolchain.toml', 'native/zenohex_nif/.cargo/**', 'native/zenohex_nif/src/**') }}

      - name: Cache cargo target and registry
        id: rust-cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            native/zenohex_nif -> target
          cache-workspace-crates: "true"

      - name: Export NIF build mode
        shell: bash
        run: echo "GHA_SKIP_ZENOHEX_NIF_BUILD=${{ steps.nif-cache.outputs.cache-hit }}" >> "$GITHUB_ENV"

      - name: Install deps
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: mix do deps.get, deps.compile

      - name: Compile project
        run: mix compile --warnings-as-errors

      - name: Run tests (Linux/macOS)
        if: runner.os != 'Windows'
        run: mix test --warnings-as-errors --cover || exit 1

      # WHY: Keep the flaky Windows close timeout from failing the whole job
      #      while we investigate the root cause separately.
      - name: Run tests with retry (Windows)
        if: runner.os == 'Windows'
        uses: nick-fields/retry@v4
        with:
          timeout_seconds: 30
          max_attempts: 2
          retry_wait_seconds: 10
          command: mix test --warnings-as-errors --cover || exit 1
          shell: bash
